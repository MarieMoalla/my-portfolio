<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
  <text x="32" y="43" font-family="Segoe UI, system-ui, sans-serif" font-size="26" font-weight="800"
        fill="none" stroke="#38bdf8" stroke-width="1.2" text-anchor="middle" letter-spacing="-1" filter="url(#neon)">MM</text>
</svg>
