<section class="page-section contact">
  <h1>Contact</h1>
  <p>Have a question or want to work together? Fill in the form below.</p>

  @if (submitted) {
    <div class="alert alert--success">
      Thanks! Your message has been sent.
    </div>
  } @else {
    <form class="contact__form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" [(ngModel)]="form.name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" [(ngModel)]="form.email" required />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" [(ngModel)]="form.message" required></textarea>
      </div>
      <button type="submit" class="btn btn--primary" [disabled]="contactForm.invalid">Send Message</button>
    </form>
  }
</section>
